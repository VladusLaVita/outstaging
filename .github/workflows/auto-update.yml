name: 🔄 Auto-Update Knowledge Base

on:
  push:
    branches: [ main ]
    paths:
      - 'data/**'              # Новые/изменённые статьи
      - 'rag/**'               # Изменения в RAG-логике
      - 'site/**'              # Изменения во фронтенде
      - 'scripts/**'           # Изменения в скриптах
      - '.github/workflows/**' # Изменения в самом пайплайне
  workflow_dispatch:          # Ручной запуск

jobs:
  trigger-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: 📡 Send webhook to home PC
        run: |
          # Формируем payload (минимальный, только для триггера)
          PAYLOAD=$(jq -n \
            --arg ref "${{ github.ref }}" \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            '{ref: $ref, repository: {full_name: $repo}, head_commit: {id: $sha}}')
          
          # Подписываем HMAC-SHA256
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" -hex | awk '{print $2}')
          
          # Отправляем на VPS (который проксирует на домашний ПК через SSH-туннель)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "http://${{ secrets.VPS_HOST }}:${{ secrets.WEBHOOK_PORT }}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "User-Agent: GitHub-Hookshot/${{ github.sha }}" \
            -d "$PAYLOAD" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" = "202" ]; then
            echo "✅ Webhook доставлен. Обновление запущено."
            echo "Ответ: $BODY"
          elif [ "$HTTP_CODE" = "403" ]; then
            echo "❌ Ошибка аутентификации: неверная подпись"
            exit 1
          else
            echo "⚠️ Webhook не доставлен (код $HTTP_CODE). Возможно, домашний ПК офлайн."
            # Не падаем — это не критично, обновление можно запустить вручную
          fi
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          WEBHOOK_PORT: ${{ secrets.WEBHOOK_PORT }}
